<script>
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});})}
let deferredPrompt;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;setTimeout(()=>{if(!localStorage.getItem("pwa_dismissed")){const b=document.getElementById("pwa-banner");if(b)b.style.display="flex";}},3000);});
function installPWA(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById("pwa-banner").style.display="none";});}}
function dismissPWA(){document.getElementById("pwa-banner").style.display="none";localStorage.setItem("pwa_dismissed","1");}
window.addEventListener("appinstalled",()=>{const b=document.getElementById("pwa-banner");if(b)b.style.display="none";});
const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
const isStandalone=window.matchMedia("(display-mode: standalone)").matches;
</script>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getFirestore,collection,addDoc,serverTimestamp,getDocs,query,where,onSnapshot,doc,updateDoc,orderBy,getDoc}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import{getStorage,ref,uploadBytes,getDownloadURL}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig={apiKey:"AIzaSyB5pXIFi1txKGJ6Xs9Rndfmu4enIuONGDk",authDomain:"okadaride-a1ec9.firebaseapp.com",projectId:"okadaride-a1ec9",storageBucket:"okadaride-a1ec9.firebasestorage.app",messagingSenderId:"152050146022",appId:"1:152050146022:web:d3210fbd1a93c4e9813927"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const storage=getStorage(app);

window.savePassenger=async(data)=>{
  try{
    const q=query(collection(db,"passengers"),where("phone","==",data.phone));
    const snap=await getDocs(q);
    if(!snap.empty){
      const d=snap.docs[0];
      await updateDoc(doc(db,"passengers",d.id),{...data,updatedAt:new Date().toISOString()});
      return{success:true,id:d.id,existing:true};
    }
    const r=await addDoc(collection(db,"passengers"),{...data,createdAt:serverTimestamp()});
    return{success:true,id:r.id,existing:false};
  }catch(e){return{success:false,error:e.message};}
};

window.getPassenger=async(phone)=>{
  try{
    const q=query(collection(db,"passengers"),where("phone","==",phone));
    const snap=await getDocs(q);
    if(snap.empty)return null;
    return{id:snap.docs[0].id,...snap.docs[0].data()};
  }catch(e){return null;}
};

window.uploadPhoto=async(file,path)=>{
  try{
    const storageRef=ref(storage,path);
    await uploadBytes(storageRef,file);
    const url=await getDownloadURL(storageRef);
    return{success:true,url};
  }catch(e){return{success:false,error:e.message};}
};

window.saveBooking=async(data)=>{
  try{const r=await addDoc(collection(db,"bookings"),{...data,status:"requested",createdAt:serverTimestamp()});return{success:true,id:r.id};}
  catch(e){return{success:false};}
};

window.saveScheduledBooking=async(data)=>{
  try{const r=await addDoc(collection(db,"scheduled_bookings"),{...data,status:"scheduled",createdAt:serverTimestamp()});return{success:true,id:r.id};}
  catch(e){return{success:false};}
};

window.fetchApprovedDrivers=async(region)=>{
  try{
    const q=query(collection(db,"driver_applications"),where("status","==","approved"));
    const snap=await getDocs(q);
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){return[];}
};

window.listenBookingStatus=async(bookingId,cb)=>{
  try{return onSnapshot(doc(db,"bookings",bookingId),snap=>{if(snap.exists())cb({id:snap.id,...snap.data()});});}
  catch(e){return()=>{};}
};

window.sendChatMessage=async(bookingId,sender,senderName,text)=>{
  try{await addDoc(collection(db,"bookings",bookingId,"messages"),{sender,senderName,text,createdAt:serverTimestamp()});return{success:true};}
  catch(e){return{success:false};}
};

window.listenChat=(bookingId,cb)=>{
  try{const q=query(collection(db,"bookings",bookingId,"messages"),orderBy("createdAt","asc"));return onSnapshot(q,snap=>{cb(snap.docs.map(d=>({id:d.id,...d.data()})));});}
  catch(e){return()=>{};}
};

window.getMyRides=async(phone)=>{
  try{
    const q=query(collection(db,"bookings"),where("passengerPhone","==",phone));
    const snap=await getDocs(q);
    return snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  }catch(e){return[];}
};

window.rateDriver=async(bookingId,driverId,drivingRating,communicationRating,comment)=>{
  try{
    await updateDoc(doc(db,"bookings",bookingId),{drivingRating,communicationRating,ratingComment:comment,rated:true});
    return{success:true};
  }catch(e){return{success:false};}
};

window.firebaseReady=true;

// Listen for driver bookings — CRITICAL for driver notifications
window.listenForBookings=(driverName,plate,cb)=>{
  try{
    const q=query(collection(db,"bookings"),where("driverName","==",driverName));
    return onSnapshot(q,snap=>{
      const bookings=snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      cb(bookings);
    });
  }catch(e){console.error("listenForBookings error:",e);return()=>{};}
};

// Also listen by plate number (fallback)
window.listenForBookingsByPlate=(plate,cb)=>{
  try{
    const q=query(collection(db,"bookings"),where("driverPlate","==",plate));
    return onSnapshot(q,snap=>{
      const bookings=snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      cb(bookings);
    });
  }catch(e){return()=>{};}
};

// Accept ride
window.acceptRide=async(bookingId,driverName)=>{
  try{
    await updateDoc(doc(db,"bookings",bookingId),{status:"accepted",acceptedAt:new Date().toISOString(),driverName});
    return{success:true};
  }catch(e){return{success:false};}
};

// Find driver by plate
window.findDriver=async(plate)=>{
  try{
    const q=query(collection(db,"driver_applications"),where("plate","==",plate.toUpperCase()),where("status","==","approved"));
    const snap=await getDocs(q);
    if(snap.empty)return{success:false,error:"No approved driver found with this plate number."};
    return{success:true,driver:{id:snap.docs[0].id,...snap.docs[0].data()}};
  }catch(e){return{success:false,error:e.message};}
};

// Verify driver PIN
window.verifyDriverPIN=async(plate,pin)=>{
  try{
    const q=query(collection(db,"driver_applications"),where("plate","==",plate.toUpperCase()),where("status","==","approved"));
    const snap=await getDocs(q);
    if(snap.empty)return{success:false,error:"Driver not found."};
    const d={id:snap.docs[0].id,...snap.docs[0].data()};
    if(d.pin!==pin)return{success:false,error:"Wrong PIN. Try again."};
    return{success:true,driver:d};
  }catch(e){return{success:false,error:e.message};}
};

// Save driver PIN
window.saveDriverPIN=async(driverId,pin)=>{
  try{await updateDoc(doc(db,"driver_applications",driverId),{pin});return{success:true};}
  catch(e){return{success:false};}
};

// Notify driver (WhatsApp)
window.notifyDriver=(booking,driver)=>{
  const clean=(driver.phone||"").replace(/[^0-9]/g,"");
  const gh=clean.startsWith("0")?"233"+clean.slice(1):clean.startsWith("233")?clean:"233"+clean;
  if(!gh||gh.length<10)return;
  const msg=`🔔 *New OkadaRide Request!*\n\nHello ${driver.name||driver.fullName}! You have a new ride!\n\n👤 Passenger: *${booking.passengerName}*\n📞 Contact: *${booking.passengerPhone}*\n📍 Pickup: ${booking.pickup}\n🎯 Dropoff: ${booking.dropoff}\n💰 Fare: GHS ${booking.fare||"5.00"}\n📱 Payment: ${booking.paymentMethod==="cash"?"Cash":"MoMo"}\n🌍 Region: ${booking.region}\n\nAccept in your Driver Portal:\nhttps://frempah.github.io/okadaride-ghana\n\n_OkadaRide Ghana 🇬🇭_`;
  window.open(`https://wa.me/${gh}?text=${encodeURIComponent(msg)}`,"_blank");
};

// Notify dispatcher
window.notifyDispatcher=(booking,driver)=>{
  const msg=`🔔 *New Booking!*\n\nPassenger: ${booking.passengerName}\n📞 ${booking.passengerPhone}\nPickup: ${booking.pickup}\nDropoff: ${booking.dropoff}\nDriver: ${driver.name||driver.fullName} (${driver.plate||""})\nFare: GHS ${booking.fare||"5.00"}\nRegion: ${booking.region}`;
  window.open(`https://wa.me/233542008513?text=${encodeURIComponent(msg)}`,"_blank");
};

console.log("✅ OkadaRide V2 Firebase ready — all functions loaded");
</script>

const getDailyQuote=()=>{
  const day=new Date().getDate();
  return ROAD_SAFETY_QUOTES[day%ROAD_SAFETY_QUOTES.length];

const BASE_FARE=3.00,RATE_PER_KM=2.50,MIN_FARE=5.00;
const DISTANCE_OPTIONS=[
  {label:"Under 1 km",km:0.5,example:"e.g. Nearby market"},
  {label:"1 – 2 km",km:1.5,example:"e.g. Short trip in town"},

  {label:"15 km+",km:18,example:"e.g. Long distance"},
];

const calcFare=(km,promo,isNight)=>{
  let f=BASE_FARE+(km*RATE_PER_KM);
  if(f<MIN_FARE)f=MIN_FARE;
  if(isNight)f*=1.2;
  if(promo==="OKADA001")f=0;
  return parseFloat(f.toFixed(2));
};

const getDriverEmoji=(gender,dob)=>{
  if(!dob)return gender==="female"?"👩🏾":"🧑🏾";
  const age=new Date().getFullYear()-new Date(dob).getFullYear();
  if(gender==="female"){
    if(age<30)return"👩🏾";
    if(age<50)return"👩🏾‍🦱";
    return"👵🏾";
  }
  if(age<30)return"🧑🏾";
  if(age<50)return"👨🏾";
  return"👴🏾";
};

// ── LIVE MAP ──────────────────────────────────────────────────────────────────
function MapScreen({user}){
  const mapRef=useRef(null);
  const mapInstanceRef=useRef(null);
  const[search,setSearch]=useState("");
  const[searching,setSearching]=useState(false);
  const[result,setResult]=useState(null);

  useEffect(()=>{
    if(mapInstanceRef.current||!mapRef.current)return;
    const map=L.map(mapRef.current,{zoomControl:true}).setView([7.9465,1.0232],7);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(map);
    // Ghana marker
    const ghanaIcon=L.divIcon({html:`<div style="background:linear-gradient(135deg,#1B7A2F,#0D4A1A);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid #FFB300;box-shadow:0 4px 12px rgba(0,0,0,.3)">🛺</div>`,className:"",iconSize:[36,36],iconAnchor:[18,18]});
    // Add major Ghana cities
    [["Accra",5.6037,-0.1870],["Kumasi",6.6885,-1.6244],["Tamale",9.4008,-0.8393],["Takoradi",4.8985,-1.7571],["Sunyani",7.3349,-2.3213],["Ho",6.6011,0.4712],["Bolgatanga",10.7879,-0.8514],["Wa",10.0601,-2.5099],["Cape Coast",5.1053,-1.2466],["Koforidua",6.0940,-0.2593]].forEach(([name,lat,lng])=>{
      L.marker([lat,lng],{icon:ghanaIcon}).addTo(map).bindPopup(`<strong>🛺 OkadaRide — ${name}</strong><br/>Available in this area`);
    });
    mapInstanceRef.current=map;
  },[]);

  const searchPlace=async()=>{
    if(!search.trim())return;
    setSearching(true);
    try{
      const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(search+", Ghana")}&format=json&limit=1`);
      const data=await res.json();
      if(data.length>0){
        const{lat,lon,display_name}=data[0];
        mapInstanceRef.current?.setView([+lat,+lon],14);
        setResult(display_name);
        const icon=L.divIcon({html:`<div style="background:#CC0000;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid #fff;box-shadow:0 4px 12px rgba(0,0,0,.3)">📍</div>`,className:"",iconSize:[32,32],iconAnchor:[16,16]});
        L.marker([+lat,+lon],{icon}).addTo(mapInstanceRef.current).bindPopup(display_name).openPopup();
      }else{setResult("Place not found. Try another search.");}
    }catch(e){setResult("Search failed. Check your connection.");}
    setSearching(false);
  };

  return(
    <div style={{paddingBottom:80}} className="screen">
      <div style={{background:C.gradMain,padding:"52px 20px 20px",position:"relative"}}>
        <TopStripe/>
        <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,color:"#fff"}}>🗺️ Find a Place</h2>
        <p style={{color:"rgba(255,255,255,.6)",fontSize:13,marginTop:4}}>Search anywhere in Ghana</p>
      </div>
      <div style={{padding:"16px 16px 0"}}>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>e.key==="Enter"&&searchPlace()}
            placeholder="Search e.g. Kumasi Central Market..."
            style={{flex:1,padding:"13px 16px",borderRadius:14,border:`1.5px solid ${C.border}`,fontSize:14,fontWeight:600,color:C.text,outline:"none"}}/>
          <button onClick={searchPlace} disabled={searching} style={{padding:"13px 18px",borderRadius:14,border:"none",background:C.gradMain,color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer"}}>
            {searching?<Spinner size={18}/>:"🔍"}
          </button>
        </div>
        {result&&<p style={{color:C.textMid,fontSize:12,fontWeight:600,marginBottom:10,padding:"8px 12px",background:C.accentSoft,borderRadius:10}}>📍 {result}</p>}
        <div ref={mapRef} style={{height:420,borderRadius:18,overflow:"hidden",border:`1px solid ${C.border}`,boxShadow:"0 4px 20px rgba(0,0,0,.1)"}}/>
        <Card style={{marginTop:12}}>
          <p style={{fontWeight:800,fontSize:13,color:C.text,marginBottom:10}}>🛺 OkadaRide operates in all 16 regions</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {GHANA_REGIONS.map(r=>(<span key={r} style={{background:C.accentSoft,color:C.primary,borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:700}}>{r}</span>))}
          </div>
        </Card>
      </div>
    </div>
  );
}

// ── PASSENGER REGISTRATION ────────────────────────────────────────────────────
function PassengerRegister({onDone}){
  const[step,setStep]=useState(1);
  const[name,setName]=useState("");
  const[phone,setPhone]=useState("");
  const[pin,setPin]=useState("");
  const[photo,setPhoto]=useState(null);
  const[photoUrl,setPhotoUrl]=useState("");
  const[otp,setOtp]=useState("");
  const[generatedOtp,setGeneratedOtp]=useState("");
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const fileRef=useRef();

  const sendOtp=()=>{
    if(!phone.trim()||phone.length<10){setError("Enter a valid Ghana number");return;}
    const code=Math.floor(100000+Math.random()*900000).toString();
    setGeneratedOtp(code);setError("");
    const clean=phone.replace(/[^0-9]/g,"");
    const gh=clean.startsWith("0")?"233"+clean.slice(1):clean.startsWith("233")?clean:"233"+clean;
    const msg=`🛺 *OkadaRide Verification*\n\nYour OTP code is: *${code}*\n\nEnter this code to complete registration.\n_OkadaRide Ghana 🇬🇭_`;
    window.open(`https://wa.me/${gh}?text=${encodeURIComponent(msg)}`,"_blank");
    setStep(2);
  };

  const verifyOtp=()=>{
    if(otp===generatedOtp){setStep(3);setError("");}
    else{setError("Wrong code. Check your WhatsApp.");}
  };

  const handlePhoto=(e)=>{
    const file=e.target.files[0];
    if(file){
      setPhoto(file);
      const reader=new FileReader();
      reader.onload=ev=>setPhotoUrl(ev.target.result);
      reader.readAsDataURL(file);
    }
  };

  const finish=async()=>{
    if(!name.trim()){setError("Enter your name");return;}
    if(!photo){setError("Please upload your photo — required for identification");return;}
    if(pin.length<4){setError("Set a 4-digit PIN for your trip history");return;}
    setLoading(true);
    // Check if number already exists
    const existing=await window.getPassenger?.(phone);
    if(existing){
      // Update existing account — keep same PIN if they already set one
      let finalPhotoUrl=existing.photoURL||photoUrl;
      if(photo&&window.uploadPhoto){
        const up=await window.uploadPhoto(photo,`passengers/${phone}_${Date.now()}.jpg`);
        if(up.success)finalPhotoUrl=up.url;
      }
      const userData={...existing,name,photoURL:finalPhotoUrl,updatedAt:new Date().toISOString()};
      await window.savePassenger?.(userData);
      localStorage.setItem("okada_user",JSON.stringify(userData));
      setLoading(false);
      onDone(userData);
      return;
    }
    let finalPhotoUrl=photoUrl;
    if(photo&&window.uploadPhoto){
      const up=await window.uploadPhoto(photo,`passengers/${phone}_${Date.now()}.jpg`);
      if(up.success)finalPhotoUrl=up.url;
    }
    const userData={name,phone,photoURL:finalPhotoUrl,pin,createdAt:new Date().toISOString()};
    const result=await window.savePassenger?.(userData);
    localStorage.setItem("okada_user",JSON.stringify(userData));
    setLoading(false);
    onDone(userData); // Auto-login immediately after registration
  };

  return(
    <div style={{minHeight:"100vh",background:C.gradMain,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
      <TopStripe/>
      <GhanaMapBg/>
      <div style={{maxWidth:380,width:"100%",animation:"slideUp .5s ease",position:"relative",zIndex:1}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{width:80,height:80,background:"rgba(255,255,255,.15)",borderRadius:24,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",border:"2px solid rgba(255,255,255,.2)"}}>
            <TukTuk size={48} color="#fff"/>
          </div>
          <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:28,fontWeight:900,color:"#fff"}}>OkadaRide</h1>
          <p style={{color:C.gold,fontSize:12,fontWeight:700,letterSpacing:2}}>PASSENGER REGISTRATION</p>
        </div>

        {/* Progress */}
        <div style={{display:"flex",gap:6,marginBottom:20}}>
          {[1,2,3].map(s=>(
            <div key={s} style={{flex:1,height:4,borderRadius:4,background:step>=s?C.gold:"rgba(255,255,255,.2)",transition:"all .3s"}}/>
          ))}
        </div>

        <div style={{background:"rgba(255,255,255,.08)",backdropFilter:"blur(10px)",borderRadius:24,padding:24,border:"1px solid rgba(255,255,255,.15)"}}>

          {step===1&&(
            <React.Fragment>
              <p style={{color:"#fff",fontWeight:800,fontSize:16,marginBottom:6}}>📱 Verify Your Number</p>
              <p style={{color:"rgba(255,255,255,.6)",fontSize:13,marginBottom:16}}>We'll send a code via WhatsApp</p>
              <input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="0XX XXX XXXX" type="tel"
                style={{width:"100%",padding:"14px",borderRadius:14,border:"1.5px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.1)",color:"#fff",fontSize:15,fontWeight:700,marginBottom:12}}/>
              {error&&<p style={{color:"#FF6B6B",fontSize:13,fontWeight:700,marginBottom:10}}>{error}</p>}
              <button onClick={sendOtp} style={{width:"100%",padding:"14px",borderRadius:14,background:`linear-gradient(135deg,#25D366,#128C7E)`,color:"#fff",fontWeight:800,fontSize:15,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                💬 Send Code via WhatsApp
              </button>
              <p style={{color:"rgba(255,255,255,.4)",fontSize:12,textAlign:"center",marginTop:12}}>Already registered? <span onClick={()=>onDone(null)} style={{color:C.gold,cursor:"pointer",fontWeight:700}}>Sign in</span></p>
            </React.Fragment>
          )}

          {step===2&&(
            <React.Fragment>
              <p style={{color:"#fff",fontWeight:800,fontSize:16,marginBottom:6}}>🔐 Enter Verification Code</p>
              <p style={{color:"rgba(255,255,255,.6)",fontSize:13,marginBottom:16}}>Check your WhatsApp for the 6-digit code</p>
              <input value={otp} onChange={e=>setOtp(e.target.value)} placeholder="Enter 6-digit code" type="number"
                style={{width:"100%",padding:"14px",borderRadius:14,border:"1.5px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.1)",color:"#fff",fontSize:18,fontWeight:700,textAlign:"center",letterSpacing:4,marginBottom:12}}/>
              {error&&<p style={{color:"#FF6B6B",fontSize:13,fontWeight:700,marginBottom:10}}>{error}</p>}
              <Btn onClick={verifyOtp}>Verify Code ✓</Btn>
              <p onClick={()=>setStep(1)} style={{color:"rgba(255,255,255,.5)",fontSize:13,textAlign:"center",marginTop:12,cursor:"pointer"}}>← Change number</p>
            </React.Fragment>
          )}

          {step===3&&(
            <React.Fragment>
              <p style={{color:"#fff",fontWeight:800,fontSize:16,marginBottom:6}}>👤 Complete Your Profile</p>
              <p style={{color:"rgba(255,255,255,.6)",fontSize:13,marginBottom:16}}>Photo is required for rider identification</p>

              {/* Photo upload */}
              <div onClick={()=>fileRef.current?.click()} style={{width:90,height:90,borderRadius:"50%",background:photoUrl?"transparent":"rgba(255,255,255,.1)",border:`3px dashed ${photoUrl?C.gold:"rgba(255,255,255,.3)"}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",cursor:"pointer",overflow:"hidden",position:"relative"}}>
                {photoUrl?<img src={photoUrl} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<React.Fragment><span style={{fontSize:28}}>📷</span><p style={{color:"rgba(255,255,255,.6)",fontSize:10,fontWeight:700,marginTop:4}}>Add Photo</p></React.Fragment>}
                {photoUrl&&<div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,.4)",padding:4,textAlign:"center"}}><p style={{color:"#fff",fontSize:9,fontWeight:700}}>Tap to change</p></div>}
              </div>
              <input ref={fileRef} type="file" accept="image/*" capture="user" onChange={handlePhoto} style={{display:"none"}}/>
              <p style={{color:C.gold,fontSize:11,fontWeight:700,textAlign:"center",marginBottom:14}}>⚠️ Photo required for identification</p>

              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your full name"
                style={{width:"100%",padding:"13px 14px",borderRadius:14,border:"1.5px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.1)",color:"#fff",fontSize:14,fontWeight:600,marginBottom:12}}/>

              <input value={pin} onChange={e=>setPin(e.target.value.slice(0,4))} placeholder="4-digit PIN for trip history" type="password"
                style={{width:"100%",padding:"13px 14px",borderRadius:14,border:"1.5px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.1)",color:"#fff",fontSize:18,fontWeight:700,letterSpacing:4,textAlign:"center",marginBottom:12}}/>
              <p style={{color:"rgba(255,255,255,.4)",fontSize:11,textAlign:"center",marginBottom:16}}>🔐 PIN protects your trip history</p>

              {error&&<p style={{color:"#FF6B6B",fontSize:13,fontWeight:700,marginBottom:10}}>{error}</p>}
              <Btn onClick={finish} disabled={loading}>{loading?<Spinner/>:"Complete Registration 🎉"}</Btn>
            </React.Fragment>
          )}
        </div>
      </div>
    </div>
  );
}

// ── UNIFIED LOGIN SCREEN ──────────────────────────────────────────────────────
function UnifiedLogin({onPassengerLogin,onDriverLogin,onRegister}){
  const[mode,setMode]=useState("choose"); // choose | passenger | driver
  const[phone,setPhone]=useState("");
  const[pin,setPin]=useState("");
  const[plate,setPlate]=useState("");
  const[driverPin,setDriverPin]=useState("");
  const[newPin,setNewPin]=useState("");
  const[confirmPin,setConfirmPin]=useState("");
  const[driverData,setDriverData]=useState(null);
  const[driverStep,setDriverStep]=useState("plate"); // plate | pin | setpin | confirmpin
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");

  // Passenger PIN login
  const passengerLogin=async()=>{
    if(!phone.trim()||phone.length<9){setError("Enter a valid Ghana number");return;}
    if(!pin||pin.length<4){setError("Enter your 4-digit PIN");return;}
    setLoading(true);setError("");
    const user=await window.getPassenger?.(phone);
    if(!user){setError("Number not registered. Please register first.");setLoading(false);return;}
    if(user.pin!==pin){setError("Wrong PIN. Try again.");setPin("");setLoading(false);return;}
    localStorage.setItem("okada_user",JSON.stringify(user));
    onPassengerLogin(user);
    setLoading(false);
  };

  // Driver plate lookup
  const findDriverForLogin=async()=>{
    if(!plate.trim()){setError("Enter your plate number");return;}
    setLoading(true);setError("");
    const res=await window.findDriver?.(plate.trim())??{success:false,error:"Not ready"};
    if(res.success){
      setDriverData(res.driver);
      setDriverStep(res.driver.pin?"pin":"setpin");
      setError("");
    }else setError(res.error||"Driver not found");
    setLoading(false);
  };

  // Driver PIN verify
  const verifyDriverLogin=async()=>{
    if(!driverPin||driverPin.length<4){setError("Enter your 4-digit PIN");return;}
    if(driverPin!==driverData.pin){setError("Wrong PIN. Try again.");setDriverPin("");return;}
    localStorage.setItem("okada_driver",JSON.stringify(driverData));
    onDriverLogin(driverData);
  };

  // Driver set new PIN
  const saveNewDriverPin=async()=>{
    if(newPin.length<4){setError("Choose 4 digits");return;}
    if(newPin!==confirmPin){setError("PINs don't match");return;}
    setLoading(true);
    await window.saveDriverPIN?.(driverData.id,newPin);
    const updated={...driverData,pin:newPin};
    localStorage.setItem("okada_driver",JSON.stringify(updated));
    onDriverLogin(updated);
    setLoading(false);
  };

  const BgWrap=({children})=>(
    <div style={{minHeight:"100vh",background:C.gradMain,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
      <TopStripe/>
      <GhanaMapBg/>
      <div style={{maxWidth:390,width:"100%",animation:"slideUp .45s ease",position:"relative",zIndex:1}}>
        {children}
      </div>
    </div>
  );

  // ── CHOOSE MODE ──
  if(mode==="choose")return(
    <BgWrap>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:88,height:88,background:"rgba(255,255,255,.12)",backdropFilter:"blur(10px)",borderRadius:26,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",border:"2px solid rgba(255,255,255,.2)",animation:"float 3s ease-in-out infinite"}}>
          <TukTuk size={54} color="#fff"/>
        </div>
        <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:32,fontWeight:900,color:"#fff",letterSpacing:-1}}>OkadaRide</h1>
        <p style={{color:C.gold,fontWeight:800,fontSize:13,letterSpacing:3,marginTop:4}}>GHANA 🇬🇭</p>
      </div>

      <p style={{color:"rgba(255,255,255,.7)",fontWeight:700,fontSize:15,textAlign:"center",marginBottom:18}}>Who are you?</p>

      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <button onClick={()=>{setMode("passenger");setError("");}} style={{background:"rgba(255,255,255,.12)",backdropFilter:"blur(10px)",border:"2px solid rgba(255,255,255,.2)",borderRadius:20,padding:"20px 20px",display:"flex",alignItems:"center",gap:16,cursor:"pointer",transition:"all .25s",width:"100%"}}>
          <div style={{width:52,height:52,background:`linear-gradient(135deg,#4285F4,#1565C0)`,borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>🧑🏾</div>
          <div style={{textAlign:"left"}}>
            <p style={{color:"#fff",fontWeight:800,fontSize:17}}>I'm a Passenger</p>
            <p style={{color:"rgba(255,255,255,.55)",fontSize:13,marginTop:3}}>Book a tricycle ride</p>
          </div>
          <span style={{color:"rgba(255,255,255,.4)",fontSize:20,marginLeft:"auto"}}>→</span>
        </button>

        <button onClick={()=>{setMode("driver");setError("");}} style={{background:"rgba(255,255,255,.12)",backdropFilter:"blur(10px)",border:"2px solid rgba(255,255,255,.2)",borderRadius:20,padding:"20px 20px",display:"flex",alignItems:"center",gap:16,cursor:"pointer",transition:"all .25s",width:"100%"}}>
          <div style={{width:52,height:52,background:`linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`,borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <TukTuk size={30} color="#fff"/>
          </div>
          <div style={{textAlign:"left"}}>
            <p style={{color:"#fff",fontWeight:800,fontSize:17}}>I'm a Driver</p>
            <p style={{color:"rgba(255,255,255,.55)",fontSize:13,marginTop:3}}>Manage your rides</p>
          </div>
          <span style={{color:"rgba(255,255,255,.4)",fontSize:20,marginLeft:"auto"}}>→</span>
        </button>
      </div>

      <p style={{color:"rgba(255,255,255,.4)",fontSize:13,textAlign:"center",marginTop:20}}>
        New passenger? <span onClick={onRegister} style={{color:C.gold,cursor:"pointer",fontWeight:800}}>Register free →</span>
      </p>
    </BgWrap>
  );

  // ── PASSENGER PIN LOGIN ──
  if(mode==="passenger")return(
    <BgWrap>
      <button onClick={()=>{setMode("choose");setError("");}} style={{background:"rgba(255,255,255,.1)",border:"none",color:"rgba(255,255,255,.6)",borderRadius:10,padding:"8px 14px",fontWeight:700,fontSize:13,marginBottom:20,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>← Back</button>
      <div style={{textAlign:"center",marginBottom:22}}>
        <div style={{width:68,height:68,background:"rgba(255,255,255,.12)",borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",fontSize:34}}>🧑🏾</div>
        <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:900,color:"#fff"}}>Passenger Login</h2>
        <p style={{color:"rgba(255,255,255,.5)",fontSize:13,marginTop:4}}>Sign in with your phone & PIN</p>
      </div>
      <div style={{background:"rgba(255,255,255,.08)",backdropFilter:"blur(10px)",borderRadius:24,padding:24,border:"1px solid rgba(255,255,255,.12)"}}>
        <p style={{color:"rgba(255,255,255,.6)",fontSize:12,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Phone Number</p>
        <input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="0XX XXX XXXX" type="tel"
          style={{width:"100%",padding:"14px",borderRadius:14,border:"1.5px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.1)",color:"#fff",fontSize:16,fontWeight:700,marginBottom:14,outline:"none"}}/>
        <p style={{color:"rgba(255,255,255,.6)",fontSize:12,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Your PIN</p>
        <input value={pin} onChange={e=>setPin(e.target.value.slice(0,4))} placeholder="••••" type="password"
          style={{width:"100%",padding:"14px",borderRadius:14,border:"1.5px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.1)",color:"#fff",fontSize:28,fontWeight:700,letterSpacing:10,textAlign:"center",marginBottom:14,outline:"none"}}
          onKeyDown={e=>e.key==="Enter"&&passengerLogin()}/>
        {error&&<div style={{background:"rgba(204,0,0,.15)",border:"1px solid rgba(204,0,0,.3)",borderRadius:10,padding:"10px 12px",marginBottom:12}}><p style={{color:"#FF6B6B",fontSize:13,fontWeight:700}}>⚠️ {error}</p></div>}
        <Btn onClick={passengerLogin} disabled={loading}>{loading?<Spinner/>:"Sign In 🔐"}</Btn>
        <p style={{color:"rgba(255,255,255,.4)",fontSize:12,textAlign:"center",marginTop:14}}>
          No account? <span onClick={onRegister} style={{color:C.gold,cursor:"pointer",fontWeight:800}}>Register free →</span>
        </p>
      </div>
    </BgWrap>
  );

  // ── DRIVER LOGIN ──
  if(mode==="driver")return(
    <BgWrap>
      <button onClick={()=>{setMode("choose");setError("");setDriverStep("plate");setDriverData(null);}} style={{background:"rgba(255,255,255,.1)",border:"none",color:"rgba(255,255,255,.6)",borderRadius:10,padding:"8px 14px",fontWeight:700,fontSize:13,marginBottom:20,cursor:"pointer"}}>← Back</button>
      <div style={{textAlign:"center",marginBottom:22}}>
        <div style={{width:68,height:68,background:"rgba(255,255,255,.12)",borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}>
          <TukTuk size={40} color="#fff"/>
        </div>
        <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:900,color:"#fff"}}>Driver Login</h2>
        <p style={{color:"rgba(255,255,255,.5)",fontSize:13,marginTop:4}}>Enter your plate number & PIN</p>
      </div>
      <div style={{background:"rgba(255,255,255,.08)",backdropFilter:"blur(10px)",borderRadius:24,padding:24,border:"1px solid rgba(255,255,255,.12)"}}>

        {/* Step indicators */}
        <div style={{display:"flex",gap:6,marginBottom:18}}>
          {["Plate","PIN"].map((s,i)=>(
            <div key={s} style={{flex:1,height:4,borderRadius:4,background:(driverStep==="plate"?i===0:i<=1)?C.gold:"rgba(255,255,255,.2)",transition:"all .3s"}}/>
          ))}
        </div>

        {driverStep==="plate"&&(
          <React.Fragment>
            <p style={{color:"rgba(255,255,255,.6)",fontSize:12,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Plate Number</p>
            <input value={plate} onChange={e=>setPlate(e.target.value.toUpperCase())} placeholder="e.g. GR-1234-20"
              style={{width:"100%",padding:"14px",borderRadius:14,border:"1.5px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.1)",color:"#fff",fontSize:17,fontWeight:800,letterSpacing:2,textAlign:"center",marginBottom:14,outline:"none"}}
              onKeyDown={e=>e.key==="Enter"&&findDriverForLogin()}/>
            {error&&<div style={{background:"rgba(204,0,0,.15)",border:"1px solid rgba(204,0,0,.3)",borderRadius:10,padding:"10px 12px",marginBottom:12}}><p style={{color:"#FF6B6B",fontSize:13,fontWeight:700}}>⚠️ {error}</p></div>}
            <Btn onClick={findDriverForLogin} disabled={loading}>{loading?<Spinner/>:"Find My Account →"}</Btn>
          </React.Fragment>
        )}

        {driverStep==="pin"&&driverData&&(
          <React.Fragment>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,padding:"12px",background:"rgba(255,255,255,.06)",borderRadius:14}}>
              <Avatar src={driverData.photoURL} emoji={getDriverEmoji(driverData.gender,driverData.dob)} size={44} verified={true}/>
              <div><p style={{color:"#fff",fontWeight:800,fontSize:15}}>{driverData.fullName}</p><p style={{color:C.gold,fontSize:12,fontWeight:700}}>{driverData.plate}</p></div>
            </div>
            <p style={{color:"rgba(255,255,255,.6)",fontSize:12,fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Enter PIN</p>
            <input value={driverPin} onChange={e=>setDriverPin(e.target.value.slice(0,4))} placeholder="••••" type="password"
              style={{width:"100%",padding:"14px",borderRadius:14,border:"1.5px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.1)",color:"#fff",fontSize:28,fontWeight:700,letterSpacing:10,textAlign:"center",marginBottom:14,outline:"none"}}
              onKeyDown={e=>e.key==="Enter"&&verifyDriverLogin()}/>
            {error&&<div style={{background:"rgba(204,0,0,.15)",border:"1px solid rgba(204,0,0,.3)",borderRadius:10,padding:"10px 12px",marginBottom:12}}><p style={{color:"#FF6B6B",fontSize:13,fontWeight:700}}>⚠️ {error}</p></div>}
            <Btn onClick={verifyDriverLogin}>Sign In ✓</Btn>
            <p onClick={()=>{setDriverStep("plate");setDriverPin("");setError("");}} style={{color:"rgba(255,255,255,.4)",fontSize:12,textAlign:"center",marginTop:12,cursor:"pointer"}}>← Change plate</p>
          </React.Fragment>
        )}

        {(driverStep==="setpin"||driverStep==="confirmpin")&&(
          <React.Fragment>
            <p style={{color:"#fff",fontWeight:800,fontSize:15,marginBottom:4}}>{driverStep==="setpin"?"Create your PIN":"Confirm your PIN"}</p>
            <p style={{color:"rgba(255,255,255,.5)",fontSize:13,marginBottom:14}}>First time — choose a 4-digit PIN</p>
            <input value={driverStep==="setpin"?newPin:confirmPin}
              onChange={e=>driverStep==="setpin"?setNewPin(e.target.value.slice(0,4)):setConfirmPin(e.target.value.slice(0,4))}
              placeholder="••••" type="password"
              style={{width:"100%",padding:"14px",borderRadius:14,border:"1.5px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.1)",color:"#fff",fontSize:28,fontWeight:700,letterSpacing:10,textAlign:"center",marginBottom:14,outline:"none"}}/>
            {error&&<div style={{background:"rgba(204,0,0,.15)",border:"1px solid rgba(204,0,0,.3)",borderRadius:10,padding:"10px 12px",marginBottom:12}}><p style={{color:"#FF6B6B",fontSize:13,fontWeight:700}}>⚠️ {error}</p></div>}
            {driverStep==="setpin"
              ?<Btn onClick={()=>{if(newPin.length===4){setDriverStep("confirmpin");setError("");}else setError("Enter 4 digits")}}>Next →</Btn>
              :<Btn onClick={saveNewDriverPin} disabled={loading}>{loading?<Spinner/>:"Save PIN & Enter"}</Btn>}
          </React.Fragment>
        )}
      </div>
    </BgWrap>
  );

  return null;
}

// ── DRIVER PORTAL ─────────────────────────────────────────────────────────────
function DriverPortal({onBack}){
  const[driverUser,setDriverUser]=useState(()=>{try{const s=localStorage.getItem("okada_driver");return s?JSON.parse(s):null;}catch{return null;}});
  if(!driverUser)return<DriverLogin onLogin={d=>{localStorage.setItem("okada_driver",JSON.stringify(d));setDriverUser(d);}} onBack={onBack}/>;
  return<DriverDashboard driver={driverUser} onLogout={()=>{localStorage.removeItem("okada_driver");setDriverUser(null);}}/>;
}

function DriverLogin({onLogin,onBack}){
  const[plate,setPlate]=useState("");
  const[pin,setPin]=useState("");
  const[newPin,setNewPin]=useState("");
  const[confirmPin,setConfirmPin]=useState("");
  const[step,setStep]=useState("plate");
  const[driver,setDriver]=useState(null);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");

  const findDriver=async()=>{
    if(!plate.trim()){setError("Enter your plate number");return;}
    setLoading(true);setError("");
    try{
      const q=query(collection?collection(db,"driver_applications"):null,where("plate","==",plate.toUpperCase()),where("status","==","approved"));
      const snap=await getDocs(q);
      if(snap.empty){setError("No approved driver found with this plate.");setLoading(false);return;}
      const d={id:snap.docs[0].id,...snap.docs[0].data()};
      setDriver(d);
      setStep(d.pin?"pin":"setpin");
    }catch(e){
      // Fallback: try window.findDriver
      const res=await window.findDriver?.(plate.trim())??{success:false,error:"Firebase not ready"};
      if(res.success){setDriver(res.driver);setStep(res.driver.pin?"pin":"setpin");}
      else setError(res.error||"Driver not found");
    }
    setLoading(false);
  };

  const verifyPin=async()=>{
    if(!pin||pin.length<4){setError("Enter your 4-digit PIN");return;}
    if(pin===driver.pin){onLogin(driver);}
    else{setError("Wrong PIN. Try again.");setPin("");}
  };

  const savePin=async()=>{
    if(newPin.length<4){setError("Enter a 4-digit PIN");return;}
    if(newPin!==confirmPin){setError("PINs don't match");return;}
    setLoading(true);
    try{await updateDoc(doc(db,"driver_applications",driver.id),{pin:newPin});}catch(e){}
    const updated={...driver,pin:newPin};
    onLogin(updated);setLoading(false);
  };

  return(
    <div style={{minHeight:"100vh",background:C.gradMain,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
      <TopStripe/>
      <GhanaMapBg/>
      <div style={{maxWidth:380,width:"100%",animation:"slideUp .5s ease",position:"relative",zIndex:1}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,.1)",border:"none",color:"rgba(255,255,255,.7)",borderRadius:10,padding:"8px 14px",fontWeight:700,fontSize:13,marginBottom:20,cursor:"pointer"}}>← Back to App</button>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{width:80,height:80,background:"rgba(255,255,255,.15)",borderRadius:24,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}><TukTuk size={48} color="#fff"/></div>
          <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:900,color:"#fff"}}>Driver Portal</h1>
          <p style={{color:C.gold,fontSize:12,fontWeight:700,letterSpacing:2}}>OKADARIDE GHANA 🇬🇭</p>
        </div>
        <div style={{background:"rgba(255,255,255,.08)",backdropFilter:"blur(10px)",borderRadius:24,padding:24,border:"1px solid rgba(255,255,255,.15)"}}>
          {step==="plate"&&(
            <React.Fragment>
              <p style={{color:"#fff",fontWeight:800,fontSize:15,marginBottom:14}}>🛺 Enter Your Plate Number</p>
              <input value={plate} onChange={e=>setPlate(e.target.value.toUpperCase())} placeholder="e.g. GR-1234-20"
                style={{width:"100%",padding:"14px",borderRadius:14,border:"1.5px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.1)",color:"#fff",fontSize:16,fontWeight:800,letterSpacing:2,textAlign:"center",marginBottom:12}}/>
              {error&&<p style={{color:"#FF6B6B",fontSize:13,fontWeight:700,marginBottom:10}}>{error}</p>}
              <Btn onClick={findDriver} disabled={loading}>{loading?<Spinner/>:"Find My Account →"}</Btn>
            </React.Fragment>
          )}
          {step==="pin"&&(
            <React.Fragment>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,padding:"12px",background:"rgba(255,255,255,.08)",borderRadius:14}}>
                <Avatar src={driver?.photoURL} emoji={getDriverEmoji(driver?.gender,driver?.dob)} size={48} verified={true}/>
                <div><p style={{color:"#fff",fontWeight:800,fontSize:15}}>{driver?.fullName}</p><p style={{color:C.gold,fontSize:12,fontWeight:700}}>{driver?.plate}</p></div>
              </div>
              <p style={{color:"rgba(255,255,255,.7)",fontSize:14,fontWeight:700,marginBottom:12}}>🔐 Enter your PIN</p>
              <input value={pin} onChange={e=>setPin(e.target.value.slice(0,4))} placeholder="••••" type="password"
                style={{width:"100%",padding:"14px",borderRadius:14,border:"1.5px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.1)",color:"#fff",fontSize:28,fontWeight:700,letterSpacing:8,textAlign:"center",marginBottom:12}}/>
              {error&&<p style={{color:"#FF6B6B",fontSize:13,fontWeight:700,marginBottom:10}}>{error}</p>}
              <Btn onClick={verifyPin}>Sign In ✓</Btn>
            </React.Fragment>
          )}
          {(step==="setpin"||step==="confirmpin")&&(
            <React.Fragment>
              <p style={{color:"#fff",fontWeight:800,fontSize:15,marginBottom:6}}>🔐 {step==="setpin"?"Create Your PIN":"Confirm Your PIN"}</p>
              <p style={{color:"rgba(255,255,255,.6)",fontSize:13,marginBottom:14}}>First time login — set a 4-digit PIN</p>
              {step==="setpin"?(
                <input value={newPin} onChange={e=>setNewPin(e.target.value.slice(0,4))} placeholder="Choose PIN" type="password"
                  style={{width:"100%",padding:"14px",borderRadius:14,border:"1.5px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.1)",color:"#fff",fontSize:28,fontWeight:700,letterSpacing:8,textAlign:"center",marginBottom:12}}/>
              ):(
                <input value={confirmPin} onChange={e=>setConfirmPin(e.target.value.slice(0,4))} placeholder="Confirm PIN" type="password"
                  style={{width:"100%",padding:"14px",borderRadius:14,border:"1.5px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.1)",color:"#fff",fontSize:28,fontWeight:700,letterSpacing:8,textAlign:"center",marginBottom:12}}/>
              )}

const DRIVER_QUICK=["On my way! 🛺","I am at the pickup 📍","Be there in 2 minutes ⏱️","Be there in 5 minutes ⏱️","Stuck in traffic 🚦","Please come outside 🚶","Calling you now 📞"];

function ChatBox({bookingId,myId,myName,otherName,quickReplies}){
  const[messages,setMessages]=useState([]);
  const[text,setText]=useState("");
  const[sending,setSending]=useState(false);
  const bottomRef=useRef(null);
  useEffect(()=>{
    if(!bookingId||!window.listenChat)return;
    const unsub=window.listenChat(bookingId,setMessages);
    return()=>unsub?.();
  },[bookingId]);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);
  const send=async(msg)=>{
    if(!msg.trim())return;setSending(true);
    await window.sendChatMessage?.(bookingId,myId,myName,msg.trim());
    setText("");setSending(false);
  };
  return(
    <div style={{background:C.bg,borderRadius:16,overflow:"hidden",border:`1px solid ${C.border}`,marginTop:12}}>
      <div style={{background:C.gradMain,padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:14}}>💬</span>
        <p style={{color:"#fff",fontWeight:800,fontSize:13}}>Chat with {otherName}</p>
        <div style={{marginLeft:"auto",width:8,height:8,borderRadius:"50%",background:C.gold,animation:"ping 1.5s ease-out infinite"}}/>
      </div>
      <div style={{maxHeight:200,overflowY:"auto",padding:"10px 10px 6px",display:"flex",flexDirection:"column",gap:6}}>
        {messages.length===0&&<p style={{color:C.textLight,fontSize:13,fontWeight:600,textAlign:"center",padding:"12px 0"}}>👋 No messages yet</p>}
        {messages.map(m=>{
          const isMine=m.sender===myId;
          const ts=m.createdAt?.seconds?new Date(m.createdAt.seconds*1000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"";
          return(
            <div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:isMine?"flex-end":"flex-start"}}>
              <div style={{background:isMine?C.gradMain:"#fff",color:isMine?"#fff":C.text,borderRadius:isMine?"14px 14px 4px 14px":"14px 14px 14px 4px",padding:"8px 12px",maxWidth:"80%",border:isMine?"none":`1px solid ${C.border}`}}>
                <p style={{fontSize:13,fontWeight:600,lineHeight:1.4}}>{m.text}</p>
              </div>
              <p style={{fontSize:10,color:C.textLight,marginTop:2,fontWeight:600}}>{isMine?"You":m.senderName}{ts&&` · ${ts}`}</p>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:"6px 8px",display:"flex",gap:5,overflowX:"auto",borderTop:`1px solid ${C.border}`}}>
        {quickReplies.map(q=>(<button key={q} onClick={()=>send(q)} style={{background:C.accentSoft,color:C.primary,border:`1px solid rgba(27,122,47,.2)`,borderRadius:20,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{q}</button>))}
      </div>
      <div style={{display:"flex",gap:8,padding:"8px",borderTop:`1px solid ${C.border}`,background:"#fff"}}>
        <input value={text} onChange={e=>setText(e.target.value)} placeholder="Type a message..." onKeyDown={e=>e.key==="Enter"&&send(text)}
          style={{flex:1,padding:"9px 12px",borderRadius:20,border:`1.5px solid ${C.border}`,fontSize:13,fontFamily:"'Nunito',sans-serif",color:C.text,outline:"none"}}/>
        <button onClick={()=>send(text)} disabled={!text.trim()||sending} style={{width:38,height:38,borderRadius:"50%",border:"none",background:text.trim()?C.gradMain:C.border,display:"flex",alignItems:"center",justifyContent:"center",cursor:text.trim()?"pointer":"not-allowed",flexShrink:0}}>
          <span style={{fontSize:16,color:"#fff"}}>➤</span>
        </button>
      </div>
    </div>
  );
}

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};

  useEffect(()=>{
    const unsubName=window.listenForBookings?.(driver.fullName,driver.plate,newBookings=>{
      setBookings(prev=>{
        const newReqs=newBookings.filter(b=>b.status==="requested").length;
        const prevReqs=prev.filter(b=>b.status==="requested").length;
        if(newReqs>prevReqs){
          showToast("🔔 New ride request!","new");
          // Play notification sound
          try{
            const ctx=new(window.AudioContext||window.webkitAudioContext)();
            const osc=ctx.createOscillator();
            const gain=ctx.createGain();
            osc.connect(gain);gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(880,ctx.currentTime);
            osc.frequency.setValueAtTime(1100,ctx.currentTime+0.1);
            osc.frequency.setValueAtTime(880,ctx.currentTime+0.2);
            gain.gain.setValueAtTime(0.3,ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
            osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.5);
          }catch(e){}
          // Browser notification
          if(Notification.permission==="granted"){
            new Notification("🛺 New OkadaRide Request!",{body:`Pickup: ${newBookings.find(b=>b.status==="requested")?.pickup||""}`,icon:"okada-icon.svg"});
          }else if(Notification.permission!=="denied"){
            Notification.requestPermission();
          }
        }
        return newBookings;
      });
    });
    // Also listen by plate as fallback
    const unsubPlate=window.listenForBookingsByPlate?.(driver.plate,newBookings=>{
      setBookings(prev=>{
        // Merge — avoid duplicates
        const allIds=new Set(prev.map(b=>b.id));
        const merged=[...prev,...newBookings.filter(b=>!allIds.has(b.id))];
        return merged.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

    });
    return()=>{unsubName?.();unsubPlate?.();};

const FARE_CONST={BASE:3,RATE:2.5,MIN:5};
function calcFare2(km,promo,isNight){
  let f=FARE_CONST.BASE+(km*FARE_CONST.RATE);
  if(f<FARE_CONST.MIN)f=FARE_CONST.MIN;
  if(isNight)f*=1.2;
  if(promo==="OKADA001")f=0;
  return parseFloat(f.toFixed(2));
}

    </div>
  );
}

// ── SCHEDULED BOOKING ─────────────────────────────────────────────────────────
function ScheduleScreen({user,onBack,onDone}){
  const[pickup,setPickup]=useState("");
  const[dropoff,setDropoff]=useState("");
  const[region,setRegion]=useState("");
  const[date,setDate]=useState("");
  const[time,setTime]=useState("");
  const[occasion,setOccasion]=useState("");
  const[saving,setSaving]=useState(false);
  const[done,setDone]=useState(false);
  const[bookingRef,setBookingRef]=useState("");

  const occasions=["Regular Trip","Airport Drop","Wedding","Funeral","Hospital Visit","School Run","Market Run","Church/Mosque","Event","Other"];

  const confirm=async()=>{
    if(!pickup||!dropoff||!region||!date||!time){alert("Please fill all fields");return;}
    setSaving(true);
    const ref="SCH-"+Date.now().toString().slice(-6);
    const data={passengerName:user.name,passengerPhone:user.phone,passengerPhotoURL:user.photoURL||"",pickup,dropoff,region,scheduledDate:date,scheduledTime:time,occasion,bookingRef:ref,status:"scheduled",createdAt:new Date().toISOString()};
    await window.saveScheduledBooking?.(data);

    // WhatsApp reminder to passenger
    const clean=(user.phone||"").replace(/[^0-9]/g,"");
    const gh=clean.startsWith("0")?"233"+clean.slice(1):clean.startsWith("233")?clean:"233"+clean;
    const msg=`📅 *OkadaRide — Scheduled Ride Confirmed!*\n\nHello ${user.name}! 👋\n\n✅ Your ride is booked!\n\n📌 Ref: *${ref}*\n🎯 Occasion: ${occasion||"Regular Trip"}\n📍 Pickup: ${pickup}\n🎯 Dropoff: ${dropoff}\n📅 Date: ${date}\n⏰ Time: ${time}\n🌍 Region: ${region}\n\nYour rider will be notified 30 minutes before the ride.\n\n_OkadaRide Ghana 🇬🇭 — We'll get you there!_`;
    window.open(`https://wa.me/${gh}?text=${encodeURIComponent(msg)}`,"_blank");

    // Also notify dispatcher
    setTimeout(()=>{
      const dispMsg=`📅 *New Scheduled Booking!*\n\nRef: ${ref}\nPassenger: ${user.name}\nPhone: ${user.phone}\nPickup: ${pickup}\nDropoff: ${dropoff}\nDate: ${date} at ${time}\nOccasion: ${occasion||"Regular Trip"}\nRegion: ${region}`;
      window.open(`https://wa.me/233542008513?text=${encodeURIComponent(dispMsg)}`,"_blank");
    },1500);

    setBookingRef(ref);setSaving(false);setDone(true);
  };

  if(done)return(
    <div style={{minHeight:"100vh",background:C.gradMain,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative"}} className="screen">
      <TopStripe/>
      <div style={{textAlign:"center",maxWidth:360}}>
        <div style={{width:80,height:80,background:"rgba(255,255,255,.15)",borderRadius:24,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",fontSize:40,animation:"bounce 2s ease-in-out infinite"}}>📅</div>
        <h2 style={{fontFamily:"'Syne',sans-serif",color:"#fff",fontSize:28,fontWeight:900,marginBottom:8}}>Ride Scheduled!</h2>
        <p style={{color:C.gold,fontWeight:800,fontSize:16,marginBottom:16}}>Ref: {bookingRef}</p>
        <div style={{background:"rgba(255,255,255,.1)",borderRadius:18,padding:20,marginBottom:20,textAlign:"left"}}>
          {[["📍 Pickup",pickup],["🎯 Dropoff",dropoff],["📅 Date",date],["⏰ Time",time],["🎉 Occasion",occasion||"Regular Trip"]].map(([l,v])=>(
            <div key={l} style={{display:"flex",gap:12,marginBottom:10}}>
              <p style={{color:"rgba(255,255,255,.6)",fontSize:13,width:80,flexShrink:0}}>{l}</p>
              <p style={{color:"#fff",fontSize:13,fontWeight:700}}>{v}</p>
            </div>
          ))}
        </div>
        <p style={{color:"rgba(255,255,255,.6)",fontSize:13,marginBottom:20}}>✅ WhatsApp confirmation sent to you and dispatcher!</p>
        <Btn onClick={onBack} gold>← Back to Home</Btn>
      </div>
    </div>
  );

  return(
    <div style={{paddingBottom:80,background:C.bg,minHeight:"100vh"}} className="screen">
      <div style={{background:C.gradMain,padding:"52px 20px 20px",position:"relative"}}>
        <TopStripe/>
        <button onClick={onBack} style={{background:"rgba(255,255,255,.15)",border:"none",color:"#fff",borderRadius:10,padding:"8px 14px",fontWeight:700,marginBottom:14,cursor:"pointer",fontSize:13}}>← Back</button>
        <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,color:"#fff"}}>📅 Schedule a Ride</h2>
        <p style={{color:"rgba(255,255,255,.6)",fontSize:13,marginTop:4}}>Book ahead for your special occasion</p>
      </div>
      <div style={{padding:"16px"}}>
        <Card style={{marginBottom:14}}>
          <p style={{fontWeight:800,fontSize:14,color:C.text,marginBottom:14}}>🎉 Occasion Details</p>
          <Sel icon="🎯" label="Occasion type" value={occasion} onChange={e=>setOccasion(e.target.value)}>
            <option value="">Select occasion type...</option>
            {occasions.map(o=><option key={o} value={o}>{o}</option>)}
          </Sel>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Inp icon="📅" type="date" placeholder="Date" value={date} onChange={e=>setDate(e.target.value)}/>
            <Inp icon="⏰" type="time" placeholder="Time" value={time} onChange={e=>setTime(e.target.value)}/>
          </div>
        </Card>
        <Card style={{marginBottom:14}}>
          <p style={{fontWeight:800,fontSize:14,color:C.text,marginBottom:14}}>📍 Trip Details</p>
          <Sel icon="🇬🇭" label="Region" value={region} onChange={e=>setRegion(e.target.value)}>
            <option value="">Select region...</option>
            {GHANA_REGIONS.map(r=><option key={r} value={r}>{r} Region</option>)}
          </Sel>
          <Inp icon="📍" placeholder="Pickup point..." value={pickup} onChange={e=>setPickup(e.target.value)}/>
          <Inp icon="🎯" placeholder="Dropoff point..." value={dropoff} onChange={e=>setDropoff(e.target.value)}/>
        </Card>
        <div style={{background:"rgba(37,211,102,.08)",border:"1px solid rgba(37,211,102,.25)",borderRadius:14,padding:"12px 14px",marginBottom:14,display:"flex",gap:10}}>
          <span style={{fontSize:20,flexShrink:0}}>📱</span>
          <div>
            <p style={{fontWeight:800,color:"#006B2E",fontSize:13}}>WhatsApp confirmation</p>
            <p style={{color:C.textMid,fontSize:12,marginTop:3}}>You and the dispatcher will receive a WhatsApp confirmation with all details.</p>
          </div>
        </div>
        <Btn onClick={confirm} disabled={saving||!pickup||!dropoff||!region||!date||!time}>
          {saving?<Spinner/>:"📅 Confirm Scheduled Ride"}
        </Btn>
      </div>
    </div>
  );
}

// ── BOOKING SCREEN ────────────────────────────────────────────────────────────
function BookingScreen({user,pickup,dropoff,region,fare,distKm,onBack,onConfirm}){
  const[sel,setSel]=useState(null);
  const[pay,setPay]=useState("cash");
  const[saving,setSaving]=useState(false);
  const[drivers,setDrivers]=useState([]);
  const[loadingDrivers,setLoadingDrivers]=useState(true);
  const[showAssurance,setShowAssurance]=useState(false);
  const displayFare=fare||5;

  useEffect(()=>{
    window.fetchApprovedDrivers?.(region).then(real=>{
      setDrivers(real.length>0?real.map(d=>({...d,avatar:getDriverEmoji(d.gender,d.dob),name:d.fullName})):[
        {id:"d1",name:"Kofi Mensah",avatar:"👨🏾",rating:"4.9",trips:"312",plate:"GR-2234-20",color:"Yellow",zone:"Sunyani",eta:"2 min",phone:"0241234567",verified:true},
        {id:"d2",name:"Kwame Asante",avatar:"🧑🏾",rating:"4.7",trips:"198",plate:"BA-1122-21",color:"Blue",zone:"Sunyani",eta:"4 min",phone:"0551234567",verified:true},
        {id:"d3",name:"Yaw Boateng",avatar:"👴🏾",rating:"4.8",trips:"521",plate:"GR-4456-19",color:"Red",zone:"Sunyani",eta:"6 min",phone:"0271234567",verified:true},
      ]);
      setLoadingDrivers(false);
    });
  },[region]);

  const doConfirm=async()=>{
    setSaving(true);
    const bookingData={passengerName:user.name,passengerPhone:user.phone,passengerPhotoURL:user.photoURL||"",pickup,dropoff,region,driverName:sel.name,driverPlate:sel.plate||sel.id,driverPhone:sel.phone||"",paymentMethod:pay,fare:displayFare,distanceKm:distKm||1.5};
    let bookingId="";
    if(window.saveBooking){const r=await window.saveBooking(bookingData);if(r.success)bookingId=r.id;}

    // Notify driver on WhatsApp with passenger contact
    const driverClean=(sel.phone||"").replace(/[^0-9]/g,"");
    const driverGh=driverClean.startsWith("0")?"233"+driverClean.slice(1):driverClean.startsWith("233")?driverClean:"233"+driverClean;
    const driverMsg=`🔔 *New OkadaRide Request!*\n\nHello ${sel.name}! You have a new ride!\n\n👤 Passenger: *${user.name}*\n📞 Contact: *${user.phone}*\n📍 Pickup: ${pickup}\n🎯 Dropoff: ${dropoff}\n💰 Fare: GHS ${displayFare}\n📱 Payment: ${pay==="cash"?"Cash":"MoMo"}\n🌍 Region: ${region}\n\nPlease accept or decline via your Driver Portal:\nhttps://frempah.github.io/okadaride-ghana/driver.html\n\n_OkadaRide Ghana 🇬🇭_`;
    if(driverGh.length>5)window.open(`https://wa.me/${driverGh}?text=${encodeURIComponent(driverMsg)}`,"_blank");

    // Notify dispatcher
    setTimeout(()=>{
      const dispMsg=`🔔 *New Booking Alert!*\n\nPassenger: ${user.name}\n📞 ${user.phone}\nPickup: ${pickup}\nDropoff: ${dropoff}\nDriver: ${sel.name} (${sel.plate||""})\nFare: GHS ${displayFare}\nRegion: ${region}`;
      window.open(`https://wa.me/233542008513?text=${encodeURIComponent(dispMsg)}`,"_blank");
    },1500);

    setSaving(false);
    onConfirm(sel,pay,bookingId,displayFare);
  };

  return(
    <div style={{paddingBottom:80,background:C.bg,minHeight:"100vh"}} className="screen">
      {showAssurance&&<AssuranceModal driver={sel} onConfirm={()=>{setShowAssurance(false);doConfirm();}} onCancel={()=>setShowAssurance(false)}/>}
      <div style={{background:C.gradMain,padding:"52px 20px 20px",position:"relative"}}>
        <TopStripe/>
        <button onClick={onBack} style={{background:"rgba(255,255,255,.15)",border:"none",color:"#fff",borderRadius:10,padding:"8px 14px",fontWeight:700,marginBottom:14,cursor:"pointer",fontSize:13}}>← Back</button>
        <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:"#fff"}}>Choose Your Rider</h2>
        <p style={{color:C.gold,fontSize:13,marginTop:4,fontWeight:700}}>📍 {region} Region</p>
        <p style={{color:"rgba(255,255,255,.6)",fontSize:12,marginTop:4}}>{pickup} → {dropoff}</p>
      </div>
      <div style={{padding:"16px"}}>
        <p style={{fontWeight:800,fontSize:14,color:C.text,marginBottom:10}}>
          {loadingDrivers?"Finding riders...":drivers.length===0?"No riders available":`${drivers.length} Rider${drivers.length>1?"s":""} Available`}
        </p>
        {loadingDrivers?(
          <div style={{textAlign:"center",padding:30}}><Spinner color={C.primary} size={32}/><p style={{color:C.textMid,marginTop:10,fontWeight:700,fontSize:14}}>Finding riders near you...</p></div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
            {drivers.map(d=>(

                <Avatar src={d.photoURL} emoji={d.avatar||getDriverEmoji(d.gender,d.dob)} size={52} verified={d.verified}/>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <p style={{fontWeight:800,fontSize:14,color:C.text}}>{d.name||d.fullName}</p>

                <p style={{fontSize:10,color:C.textLight,marginTop:2}}>{distKm||1.5}km · GHS 2.50/km</p>
              </div>
              <div style={{textAlign:"right"}}>
                <p style={{fontSize:12,color:C.textMid,fontWeight:600}}>Pay via</p>

// ── TRACKING SCREEN ───────────────────────────────────────────────────────────
const PASSENGER_QUICK=["I am waiting outside 👋","On my way to pickup 🚶","Please wait 2 mins ⏳","I can see you! 👀","Where are you? 📍","I am at the gate 🚪","Almost there! 🏃","Thank you driver! 🙏"];

function TrackingScreen({user,bookingId,driver,pickup,dropoff,region,payMethod,fare,onDriverAccepted,onCancel,onGoHome}){
  const[status,setStatus]=useState("requested");
  const[showChat,setShowChat]=useState(false);
  const[driverInfo,setDriverInfo]=useState(driver);

  useEffect(()=>{
    if(!bookingId||!window.listenBookingStatus)return;
    const unsub=window.listenBookingStatus(bookingId,booking=>{
      setStatus(booking.status);
      if(booking.status==="accepted"){setShowChat(true);onDriverAccepted();}
    });
    return()=>unsub?.();
  },[bookingId]);

  const steps=[
    {key:"sent",label:"Booking Sent",desc:"Driver has been notified via WhatsApp",icon:"📤",done:true},
    {key:"accepted",label:"Driver Accepted",desc:`${driverInfo?.name||"Driver"} is on the way`,icon:"✅",done:status==="accepted"||status==="completed"},
    {key:"arriving",label:"Driver Arriving",desc:"Almost at your pickup point",icon:"🛺",done:status==="completed"},
  ];

  return(
    <div style={{paddingBottom:80,background:C.bg,minHeight:"100vh"}} className="screen">
      <div style={{background:C.gradMain,padding:"52px 20px 20px",position:"relative"}}>
        <TopStripe/>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <Avatar src={driverInfo?.photoURL} emoji={getDriverEmoji(driverInfo?.gender,driverInfo?.dob)} size={48} verified={true}/>
          <div>
            <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:"#fff"}}>{driverInfo?.name||"Finding Driver..."}</h2>
            <p style={{color:C.gold,fontSize:13,fontWeight:700}}>🛺 {driverInfo?.plate||""}</p>
          </div>
        </div>
        <p style={{color:"rgba(255,255,255,.6)",fontSize:12,marginTop:10}}>
          {status==="requested"?"Waiting for driver to accept...":"Driver accepted! On the way 🛺"}
        </p>
      </div>
      <div style={{padding:"16px"}}>
        {/* Status steps */}
        <Card style={{marginBottom:12}}>
          <p style={{fontWeight:800,fontSize:14,color:C.text,marginBottom:14}}>📍 Ride Status</p>
          {steps.map((s,i)=>(
            <div key={s.key} style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:i<steps.length-1?14:0}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
                <div style={{width:38,height:38,borderRadius:"50%",background:s.done?C.gradMain:"rgba(0,0,0,.06)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .5s"}}>
                  {s.done?<span style={{color:"#fff",fontSize:14}}>✓</span>:<span style={{opacity:.4,fontSize:16}}>{s.icon}</span>}
                </div>
                {i<steps.length-1&&<div style={{width:2,height:18,background:s.done?C.primary:"rgba(0,0,0,.1)",marginTop:4,transition:"all .5s"}}/>}
              </div>
              <div style={{paddingTop:8}}>
                <p style={{fontWeight:800,fontSize:13,color:s.done?C.text:"rgba(0,0,0,.3)"}}>{s.label}</p>
                <p style={{color:s.done?C.textMid:"rgba(0,0,0,.2)",fontSize:11,marginTop:2}}>{s.desc}</p>
              </div>
            </div>
          ))}
        </Card>

        {/* Driver details */}
        <Card style={{marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12,paddingBottom:12,borderBottom:`1px solid ${C.border}`}}>
            <Avatar src={driverInfo?.photoURL} emoji={getDriverEmoji(driverInfo?.gender,driverInfo?.dob)} size={52} verified={true}/>
            <div style={{flex:1}}>
              <p style={{fontWeight:800,fontSize:15,color:C.text}}>{driverInfo?.name||"Your Driver"}</p>
              <p style={{color:C.textMid,fontSize:12,marginTop:2}}>⭐ {driverInfo?.rating||"4.8"} · 🛺 {driverInfo?.plate||""}</p>
            </div>
            <div style={{background:"rgba(0,200,83,.1)",color:C.success,borderRadius:10,padding:"6px 12px",fontWeight:700,fontSize:12}}>{driverInfo?.eta||"~3 min"}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <a href={`tel:${driverInfo?.phone}`} style={{textDecoration:"none"}}>
              <div style={{background:C.gradMain,borderRadius:12,padding:"12px",textAlign:"center"}}><p style={{fontSize:20}}>📞</p><p style={{color:"#fff",fontWeight:800,fontSize:12,marginTop:4}}>Call Driver</p></div>
            </a>
            <button onClick={()=>setShowChat(v=>!v)} style={{background:showChat?C.gradMain:C.accentSoft,border:"none",borderRadius:12,padding:"12px",textAlign:"center",cursor:"pointer"}}>
              <p style={{fontSize:20}}>💬</p><p style={{color:showChat?"#fff":C.primary,fontWeight:800,fontSize:12,marginTop:4}}>Chat</p>
            </button>
          </div>
        </Card>

        {/* Fare */}
        <Card style={{marginBottom:12,background:C.accentSoft,border:`1px solid rgba(27,122,47,.2)`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={{fontSize:12,color:C.textMid,fontWeight:600}}>Total Fare</p>
              <p style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:C.primary,marginTop:2}}>{fare===0?"FREE 🎉":`GHS ${(fare||5).toFixed(2)}`}</p>
            </div>
            <div style={{textAlign:"right"}}>
              <p style={{fontSize:12,color:C.textMid,fontWeight:600}}>Payment</p>
              <p style={{fontWeight:700,color:C.text,marginTop:2}}>{payMethod==="cash"?"💵 Cash":"📱 MoMo"}</p>
            </div>
          </div>
        </Card>

        {/* Chat */}
        {showChat&&status==="accepted"&&(
          <div style={{marginBottom:12}}>
            <div style={{background:"#fff",borderRadius:16,overflow:"hidden",border:`1px solid ${C.border}`}}>
              <div style={{background:C.gradMain,padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:14}}>💬</span>
                <p style={{color:"#fff",fontWeight:800,fontSize:13}}>Chat with {driverInfo?.name||"Driver"}</p>
                <div style={{marginLeft:"auto",width:8,height:8,borderRadius:"50%",background:C.gold,animation:"ping 1.5s ease-out infinite"}}/>
              </div>
              <ChatBox bookingId={bookingId} myId={`passenger_${user.phone}`} myName={user.name} otherName={driverInfo?.name||"Driver"} quickReplies={PASSENGER_QUICK}/>
            </div>
          </div>
        )}

        {/* Back to home — keep browsing while waiting */}
        <div style={{background:"rgba(27,122,47,.06)",border:`1px solid rgba(27,122,47,.15)`,borderRadius:16,padding:"14px 16px",marginBottom:12,display:"flex",gap:12,alignItems:"center"}}>
          <span style={{fontSize:22,flexShrink:0}}>💡</span>
          <div style={{flex:1}}>
            <p style={{fontWeight:800,color:C.text,fontSize:13}}>Your ride is being processed!</p>
            <p style={{color:C.textMid,fontSize:12,marginTop:3}}>You can browse the app while waiting. This screen will update automatically.</p>
          </div>
        </div>
        <Btn onClick={onGoHome} style={{marginBottom:10}}>
          🏠 Back to Home — Keep Browsing
        </Btn>
        <Btn ghost onClick={onCancel} style={{color:C.red,borderColor:"rgba(204,0,0,.2)",marginBottom:16}}>Cancel Booking</Btn>
      </div>
    </div>
  );
}

  const[elapsed,setElapsed]=useState(0);

  const fmt=s=>`${Math.floor(s/60).toString().padStart(2,"0")}:${(s%60).toString().padStart(2,"0")}`;

    <div style={{paddingBottom:80,background:C.bg,minHeight:"100vh"}} className="screen">
      <div style={{background:C.gradMain,padding:"52px 20px 20px",position:"relative"}}>
        <TopStripe/>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
          <Avatar src={driver?.photoURL} emoji={getDriverEmoji(driver?.gender,driver?.dob)} size={52} verified={true}/>
          <div>

        </div>
        <div style={{display:"flex",gap:8}}>
          {[["📍",pickup,"Pickup"],["🎯",dropoff,"Dropoff"]].map(([icon,val,label])=>(
            <div key={label} style={{flex:1,background:"rgba(255,255,255,.1)",borderRadius:12,padding:"10px 12px"}}>
              <p style={{color:"rgba(255,255,255,.5)",fontSize:10,fontWeight:700}}>{icon} {label}</p>

      <div style={{padding:"16px"}}>
        <Card style={{marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><p style={{color:C.textLight,fontSize:11,fontWeight:700}}>PAYMENT</p><p style={{fontWeight:800,color:C.text,fontSize:15,marginTop:3}}>{payMethod==="cash"?"💵 Cash":"📱 MoMo"}</p></div>
          <div style={{textAlign:"right"}}><p style={{color:C.textLight,fontSize:11,fontWeight:700}}>FARE</p><p style={{fontFamily:"'Syne',sans-serif",fontWeight:800,color:C.primary,fontSize:22,marginTop:3}}>{fare===0?"FREE 🎉":`GHS ${(fare||5).toFixed(2)}`}</p></div>
        </Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <a href={`tel:${driver?.phone}`} style={{textDecoration:"none"}}>
            <div style={{background:C.gradMain,borderRadius:14,padding:"14px",textAlign:"center"}}><p style={{fontSize:22}}>📞</p><p style={{color:"#fff",fontWeight:800,fontSize:13,marginTop:6}}>Call Driver</p></div>
          </a>
          <div onClick={()=>{const c=(driver?.phone||"").replace(/[^0-9]/g,"");const g=c.startsWith("0")?"233"+c.slice(1):c;const m=`Hello, I am your OkadaRide passenger ${user.name}. I'm ready at ${pickup}.`;window.open(`https://wa.me/${g}?text=${encodeURIComponent(m)}`,"_blank");}} style={{background:"linear-gradient(135deg,#25D366,#128C7E)",borderRadius:14,padding:"14px",textAlign:"center",cursor:"pointer"}}>
            <p style={{fontSize:22}}>💬</p><p style={{color:"#fff",fontWeight:800,fontSize:13,marginTop:6}}>WhatsApp</p>

  );

      </div>
