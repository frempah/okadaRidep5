// ── TRIP HISTORY ──────────────────────────────────────────────────────────────
function TripsScreen({user}){
  const[rides,setRides]=useState([]);
  const[loading,setLoading]=useState(true);
  const[locked,setLocked]=useState(true);
  const[pinInput,setPinInput]=useState("");
  const[error,setError]=useState("");

  const unlock=()=>{
    if(pinInput===user.pin){setLocked(false);setError("");}
    else{setError("Wrong PIN");setPinInput("");}
  };

  useEffect(()=>{
    if(!locked){
      setLoading(true);
      window.getMyRides?.(user.phone).then(r=>{setRides(r);setLoading(false);});
    }
  },[locked]);

  if(locked)return(
    <div style={{paddingBottom:80,background:C.bg,minHeight:"100vh"}} className="screen">
      <div style={{background:C.gradMain,padding:"52px 20px 20px",position:"relative"}}>
        <TopStripe/>
        <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:"#fff"}}>📋 Trip History</h2>
        <p style={{color:"rgba(255,255,255,.6)",fontSize:13,marginTop:4}}>Protected by your PIN</p>
      </div>
      <div style={{padding:"16px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:300}}>
        <Card style={{width:"100%",maxWidth:300,textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:12}}>🔐</div>
          <h3 style={{fontWeight:800,fontSize:16,color:C.text,marginBottom:6}}>Enter Your PIN</h3>
          <p style={{color:C.textMid,fontSize:13,marginBottom:16}}>Your trip history is protected</p>
          <input value={pinInput} onChange={e=>setPinInput(e.target.value.slice(0,4))} type="password" placeholder="••••"
            style={{width:"100%",padding:"14px",borderRadius:14,border:`1.5px solid ${C.border}`,fontSize:28,fontWeight:700,textAlign:"center",letterSpacing:8,marginBottom:12,color:C.text,outline:"none"}}/>
          {error&&<p style={{color:C.red,fontSize:13,fontWeight:700,marginBottom:10}}>{error}</p>}
          <Btn onClick={unlock}>Unlock History 🔓</Btn>
        </Card>
      </div>
    </div>
  );

  return(
    <div style={{paddingBottom:80,background:C.bg,minHeight:"100vh"}} className="screen">
      <div style={{background:C.gradMain,padding:"52px 20px 20px",position:"relative"}}>
        <TopStripe/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <div>
            <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:"#fff"}}>📋 Trip History</h2>
            <p style={{color:"rgba(255,255,255,.6)",fontSize:13,marginTop:4}}>{rides.length} rides found</p>
          </div>
          <button onClick={()=>setLocked(true)} style={{background:"rgba(255,255,255,.1)",border:"none",color:"rgba(255,255,255,.6)",borderRadius:10,padding:"8px 12px",fontWeight:700,fontSize:12,cursor:"pointer"}}>🔒 Lock</button>
        </div>
      </div>
      <div style={{padding:"16px"}}>
        {loading&&<div style={{textAlign:"center",padding:30}}><Spinner color={C.primary} size={32}/></div>}
        {!loading&&rides.length===0&&(
          <div style={{textAlign:"center",padding:"40px 20px"}}>
            <p style={{fontSize:40,marginBottom:12}}>🛺</p>
            <p style={{fontWeight:800,fontSize:16,color:C.text}}>No trips yet</p>
            <p style={{color:C.textMid,fontSize:13,marginTop:6}}>Book your first ride to see history here</p>
          </div>
        )}
        {rides.map(r=>(
          <Card key={r.id} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <p style={{fontWeight:800,fontSize:14,color:C.text}}>{r.pickup} → {r.dropoff}</p>
                <p style={{color:C.textMid,fontSize:12,marginTop:2}}>{r.createdAt?.seconds?new Date(r.createdAt.seconds*1000).toLocaleDateString():r.createdAt||"Recent"}</p>
              </div>
              <div style={{background:r.status==="completed"?"rgba(0,200,83,.1)":"rgba(255,179,0,.1)",borderRadius:10,padding:"4px 10px"}}>
                <p style={{color:r.status==="completed"?C.success:C.gold,fontWeight:700,fontSize:11,textTransform:"capitalize"}}>{r.status}</p>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <p style={{color:C.textMid,fontSize:12}}>🛺 {r.driverName} · {r.region}</p>
              <p style={{fontFamily:"'Syne',sans-serif",fontWeight:800,color:C.primary,fontSize:16}}>GHS {r.fare||"5.00"}</p>
            </div>
            {r.rated&&<p style={{color:C.gold,fontSize:11,fontWeight:700,marginTop:6}}>⭐ Rated</p>}
          </Card>
        ))}
      </div>
    </div>
  );
}

// ── PROFILE SCREEN ────────────────────────────────────────────────────────────
function ProfileScreen({user,onSignOut,onUpdate}){
  const[editing,setEditing]=useState(false);
  const[name,setName]=useState(user.name);
  const[photo,setPhoto]=useState(null);
  const[photoUrl,setPhotoUrl]=useState(user.photoURL||"");
  const[saving,setSaving]=useState(false);
  const fileRef=useRef();

  const handlePhoto=e=>{
    const file=e.target.files[0];
    if(file){setPhoto(file);const r=new FileReader();r.onload=ev=>setPhotoUrl(ev.target.result);r.readAsDataURL(file);}
  };

  const save=async()=>{
    setSaving(true);
    let finalUrl=photoUrl;
    if(photo&&window.uploadPhoto){const up=await window.uploadPhoto(photo,`passengers/${user.phone}_${Date.now()}.jpg`);if(up.success)finalUrl=up.url;}
    const updated={...user,name,photoURL:finalUrl};
    await window.savePassenger?.(updated);
    localStorage.setItem("okada_user",JSON.stringify(updated));
    onUpdate(updated);setSaving(false);setEditing(false);
  };

  return(
    <div style={{paddingBottom:80,background:C.bg,minHeight:"100vh"}} className="screen">
      <div style={{background:C.gradMain,padding:"52px 20px 28px",position:"relative",textAlign:"center"}}>
        <TopStripe/>
        <div style={{position:"relative",display:"inline-block",marginBottom:14}}>
          <Avatar src={photoUrl} emoji="🧑🏾" size={80} verified={false}/>
          {editing&&(
            <button onClick={()=>fileRef.current?.click()} style={{position:"absolute",bottom:0,right:0,width:28,height:28,borderRadius:"50%",background:C.gold,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>📷</button>
          )}
        </div>
        <input ref={fileRef} type="file" accept="image/*" capture="user" onChange={handlePhoto} style={{display:"none"}}/>
        {editing?(
          <input value={name} onChange={e=>setName(e.target.value)} style={{background:"rgba(255,255,255,.15)",border:"1.5px solid rgba(255,255,255,.3)",borderRadius:10,padding:"8px 14px",color:"#fff",fontWeight:800,fontSize:18,textAlign:"center",width:"100%",maxWidth:240}}/>
        ):(
          <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:"#fff"}}>{user.name}</h2>
        )}
        <p style={{color:"rgba(255,255,255,.6)",fontSize:13,marginTop:4}}>📞 {user.phone}</p>
      </div>
      <div style={{padding:"16px"}}>
        <Card style={{marginBottom:14}}>
          {[["📞 Phone",user.phone],["🔐 Trip PIN","••••"],["📅 Member since",user.createdAt?new Date(user.createdAt).toLocaleDateString():"Recent"]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"11px 0",borderBottom:`1px solid ${C.border}`}}>
              <p style={{color:C.textMid,fontSize:13,fontWeight:600}}>{l}</p>
              <p style={{color:C.text,fontSize:13,fontWeight:700}}>{v}</p>
            </div>
          ))}
        </Card>
        {editing?(
          <React.Fragment>
            <Btn onClick={save} disabled={saving} style={{marginBottom:10}}>{saving?<Spinner/>:"Save Changes ✓"}</Btn>
            <Btn ghost onClick={()=>{setEditing(false);setName(user.name);setPhotoUrl(user.photoURL||"");}}>Cancel</Btn>
          </React.Fragment>
        ):(
          <React.Fragment>
            <Btn ghost onClick={()=>setEditing(true)} style={{marginBottom:10}}>✏️ Edit Profile</Btn>
            <Btn danger onClick={onSignOut}>Sign Out</Btn>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

// ── BOTTOM NAV ────────────────────────────────────────────────────────────────
function BottomNav({tab,setTab,unreadMessages=0}){
  const tabs=[
    ["home","home","🛺","Home"],
    ["trips","trips","📋","Trips"],
    ["map","map","🗺️","Map"],
    ["profile","profile","👤","Profile"],
  ];
  return(
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#fff",borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom)",boxShadow:"0 -4px 20px rgba(0,0,0,.08)"}}>
      {tabs.map(([t,,icon,label])=>(
        <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"10px 0 8px",border:"none",background:"transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",transition:"all .25s",position:"relative"}}>
          <div style={{fontSize:tab===t?22:18,transition:"font-size .25s"}}>{icon}</div>
          <p style={{fontSize:10,fontWeight:tab===t?800:600,color:tab===t?C.primary:"#aaa",transition:"color .25s"}}>{label}</p>
          {tab===t&&<div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:24,height:3,borderRadius:3,background:C.primary}}/>}
          {t==="trips"&&unreadMessages>0&&(
            <div style={{position:"absolute",top:6,right:"50%",marginRight:-18,width:18,height:18,borderRadius:"50%",background:C.red,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <p style={{color:"#fff",fontSize:9,fontWeight:800}}>{unreadMessages>9?"9+":unreadMessages}</p>
            </div>
          )}
        </button>
      ))}
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const[splash,setSplash]=useState(true);
  const[showQuote,setShowQuote]=useState(false);
  const[user,setUser]=useState(()=>{try{const s=localStorage.getItem("okada_user");return s?JSON.parse(s):null;}catch{return null;}});
  const[driverUser,setDriverUser]=useState(()=>{try{const s=localStorage.getItem("okada_driver");return s?JSON.parse(s):null;}catch{return null;}});
  const[authMode,setAuthMode]=useState("login");
  const[tab,setTab]=useState("home");
  const[flow,setFlow]=useState("home");
  const[pickup,setPickup]=useState("");
  const[dropoff,setDropoff]=useState("");
  const[region,setRegion]=useState("");
  const[driver,setDriver]=useState(null);
  const[pay,setPay]=useState("cash");
  const[bookingId,setBookingId]=useState("");
  const[fare,setFare]=useState(5);
  const[distKm,setDistKm]=useState(1.5);
  const[showDriver,setShowDriver]=useState(!!driverUser);
  const[unread,setUnread]=useState(0);

  const resetFlow=()=>{setFlow("home");setPickup("");setDropoff("");setRegion("");setDriver(null);setBookingId("");setFare(5);setDistKm(1.5);};

  // Show daily quote on first open
  useEffect(()=>{
    if(!splash&&(user||driverUser)){
      const today=new Date().toDateString();
      const lastQuote=localStorage.getItem("okada_quote_day");
      if(lastQuote!==today){setShowQuote(true);localStorage.setItem("okada_quote_day",today);}
    }
  },[splash,user,driverUser]);

  if(splash)return<SplashScreen onDone={()=>setSplash(false)}/>;

  // If driver is logged in — show driver portal
  if(showDriver&&driverUser)return(
    <DriverDashboard driver={driverUser} onLogout={()=>{localStorage.removeItem("okada_driver");setDriverUser(null);setShowDriver(false);}}/>
  );

  // Auth screens
  if(!user&&authMode==="register")return<PassengerRegister onDone={u=>{if(u){setUser(u);setAuthMode("login");}else setAuthMode("login");}}/>;
  if(!user)return<UnifiedLogin
    onPassengerLogin={u=>{setUser(u);}}
    onDriverLogin={d=>{setDriverUser(d);localStorage.setItem("okada_driver",JSON.stringify(d));setShowDriver(true);}}
    onRegister={()=>setAuthMode("register")}
  />;

  const inFlow=flow==="booking"||flow==="schedule";
  const isActiveRide=flow==="browsing";

  return(
    <div style={{width:"100%",minHeight:"100vh",background:C.bg,position:"relative"}}>
      <GhanaMapBg/>
      {showQuote&&<DailyQuoteModal onClose={()=>setShowQuote(false)}/>}

      {/* Active ride banner */}
      {isActiveRide&&(
        <div onClick={()=>setFlow("tracking")} style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,zIndex:200,background:`linear-gradient(135deg,${C.success},#006B2E)`,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",boxShadow:"0 4px 16px rgba(0,200,83,.4)"}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:"#fff",animation:"ping 1s ease-out infinite",flexShrink:0}}/>
          <div style={{flex:1}}>
            <p style={{color:"#fff",fontWeight:800,fontSize:13}}>🛺 Ride in Progress — {driver?.name||"Driver"}</p>
            <p style={{color:"rgba(255,255,255,.75)",fontSize:11,marginTop:1}}>Tap to return to your ride</p>
          </div>
          <span style={{color:"#fff",fontWeight:800,fontSize:16}}>→</span>
        </div>
      )}

      {/* Home tabs */}
      {(flow==="home"||isActiveRide)&&tab==="home"&&<HomeScreen user={user} goBook={(p,d,r,f,km)=>{setPickup(p);setDropoff(d);setRegion(r);setFare(f||5);setDistKm(km||1.5);setFlow("booking");}} goSchedule={()=>setFlow("schedule")}/>}
      {(flow==="home"||isActiveRide)&&tab==="trips"&&<TripsScreen user={user}/>}
      {(flow==="home"||isActiveRide)&&tab==="map"&&<MapScreen user={user}/>}
      {(flow==="home"||isActiveRide)&&tab==="profile"&&<ProfileScreen user={user} onSignOut={()=>{localStorage.removeItem("okada_user");setUser(null);}} onUpdate={u=>setUser(u)}/>}

      {flow==="schedule"&&<ScheduleScreen user={user} onBack={()=>setFlow("home")} onDone={()=>setFlow("home")}/>}
      {flow==="booking"&&<BookingScreen user={user} pickup={pickup} dropoff={dropoff} region={region} fare={fare} distKm={distKm} onBack={()=>setFlow("home")} onConfirm={(d,p,bid,f)=>{setDriver(d);setPay(p);setBookingId(bid);setFare(f||fare);setFlow("tracking");}}/>}
      {flow==="tracking"&&<TrackingScreen user={user} bookingId={bookingId} driver={driver} pickup={pickup} dropoff={dropoff} region={region} payMethod={pay} fare={fare} onDriverAccepted={()=>setFlow("ride")} onCancel={resetFlow} onGoHome={()=>setFlow("browsing")}/>}
      {flow==="ride"&&<RideScreen user={user} driver={driver} pickup={pickup} dropoff={dropoff} payMethod={pay} fare={fare} bookingId={bookingId} onEnd={()=>setFlow("payment")} onGoHome={()=>setFlow("browsing")}/>}
      {flow==="payment"&&<PaymentScreen driver={driver} payMethod={pay} fare={fare} distKm={distKm} bookingId={bookingId} onDone={resetFlow}/>}

      {(flow==="home"||isActiveRide)&&<BottomNav tab={tab} setTab={t=>setTab(t)} unreadMessages={unread}/>}
      {inFlow&&<BottomNav tab={tab} setTab={t=>{setFlow("home");setTab(t);}} unreadMessages={unread}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
